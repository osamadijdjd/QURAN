<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - مدير الحلقة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --olive: #808000; --beige: #fdfaf5; }
        body { background: var(--beige); font-family: sans-serif; padding-bottom: 30px; }
        .top-nav { background: var(--olive); color: white; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .profile-card { background: white; border-radius: 20px; padding: 25px; margin: 20px auto; width: 90%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .img-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--olive); margin-bottom: 15px; background: #eee; }
        .form-label { font-weight: bold; color: var(--olive); display: block; text-align: right; margin-top: 10px; }
        .btn-save { background: var(--olive); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; }
        #imageInput { display: none; }
        .upload-label { cursor: pointer; color: var(--olive); font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="top-nav shadow">
    <a href="index.html" class="text-white text-decoration-none"><i class="fas fa-arrow-right"></i></a>
    <h5 class="mb-0">إعدادات الملف الشخصي</h5>
</div>

<div class="profile-card border">
    <div class="position-relative d-inline-block">
        <img id="viewImg" src="https://via.placeholder.com/120" class="img-preview shadow-sm">
        <label for="imageInput" class="position-absolute bottom-0 start-0 bg-white rounded-circle p-2 shadow-sm border" style="cursor: pointer;">
            <i class="fas fa-camera text-success"></i>
        </label>
    </div>
    <input type="file" id="imageInput" accept="image/*" onchange="previewFile()">
    <p class="upload-label" onclick="document.getElementById('imageInput').click()">تغيير صورة الحلقة</p>

    <form id="profileForm">
        <label class="form-label">اسم المعلم:</label>
        <input type="text" id="teacherName" class="form-control" placeholder="أدخل اسمك" required>

        <label class="form-label">اسم المركز:</label>
        <input type="text" id="centerName" class="form-control" placeholder="مثلاً: مركز نور الهدى" required>

        <label class="form-label">اسم الحلقة:</label>
        <input type="text" id="halaqaName" class="form-control" placeholder="مثلاً: حلقة الإخلاص" required>

        <button type="submit" class="btn-save shadow"><i class="fas fa-check-circle"></i> حفظ التعديلات</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // تحميل البيانات المحفوظة عند فتح الصفحة
    window.onload = function() {
        const savedData = JSON.parse(localStorage.getItem('teacherProfile') || '{}');
        if (savedData.name) {
            document.getElementById('teacherName').value = savedData.name;
            document.getElementById('centerName').value = savedData.center;
            document.getElementById('halaqaName').value = savedData.halaqa;
            if (savedData.image) document.getElementById('viewImg').src = savedData.image;
        }
    };

    // معاينة الصورة المختارة وتحويلها لنص (Base64) لحفظها
    function previewFile() {
        const file = document.getElementById('imageInput').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            document.getElementById('viewImg').src = reader.result;
        }
        if (file) reader.readAsDataURL(file);
    }

    // حفظ البيانات
    document.getElementById('profileForm').onsubmit = (e) => {
        e.preventDefault();
        const profile = {
            name: document.getElementById('teacherName').value,
            center: document.getElementById('centerName').value,
            halaqa: document.getElementById('halaqaName').value,
            image: document.getElementById('viewImg').src
        };
        localStorage.setItem('teacherProfile', JSON.stringify(profile));
        Swal.fire({ icon: 'success', title: 'تم الحفظ بنجاح', confirmButtonColor: '#808000' });
    };
</script>
</body>
</html>
